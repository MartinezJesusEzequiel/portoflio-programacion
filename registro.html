    <section id="registro">
        <h2>Formulario de Registro</h2>
        <p style="text-align: center; margin-bottom: 2rem;">Por favor, ingresa tus datos para crear una nueva cuenta.</p>
        
        <form action="#" method="POST" class="formulario">
            <div class="form-group">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
            </div>
            
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Crea una contraseña segura">
            </div>
            
            <button type="submit" class="btn-submit">Registrarse Ahora</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Mi Portafolio</p>
